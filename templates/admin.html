<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagie Foods | Kitchen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 30px; margin: 0; }
        .container { 
            background: white; padding: 30px; border-radius: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 1200px; margin: auto;
        }
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1a1a2e; color: white; padding: 20px 30px; 
            border-radius: 20px; margin-bottom: 30px;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0 15px; }
        th { padding: 15px; color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; text-align: left; }
        td { 
            padding: 20px; background: #fff; border-top: 1px solid #f0f0f0; 
            border-bottom: 1px solid #f0f0f0; 
        }
        td:first-child { border-left: 1px solid #f0f0f0; border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 1px solid #f0f0f0; border-radius: 0 15px 15px 0; }
        
        .badge { 
            padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; 
            background: #fff9e6; color: #f1c40f; 
        }
        .badge.done { background: #e8f5e9; color: #2e7d32; }
        .note-box { 
            background: #fff4e5; padding: 10px; border-radius: 10px; 
            border-left: 5px solid #ffa502; margin-top: 10px; font-size: 13px; 
        }
        .btn-done { 
            background: #1a1a2e; color: white; padding: 10px 20px; 
            border-radius: 12px; text-decoration: none; font-size: 12px; font-weight: 600;
            display: inline-block;
        }
        .btn-done:hover { background: #f1c40f; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0;"><i class="fas fa-fire"></i> Kitchen Queue</h2>
            <a href="index.html" style="color: #ff7675; text-decoration: none; font-weight: 600;"><i class="fas fa-power-off"></i> Logout</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Order</th>
                    <th>Customer</th>
                    <th>Details</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><b style="color:#888;">#101</b></td>
                    <td><b>John Doe</b><br><small style="color:#999;">+256 700 000 000</small></td>
                    <td>
                        <span style="font-weight:600;">Jollof Rice, Grilled Chicken</span><br>
                        <small style="color: #0984e3;"><i class="fas fa-map-marker-alt"></i> Delivery</small>
                        <div class="note-box"><b>Note:</b> Please make it spicy!</div>
                    </td>
                    <td><b style="color:#27ae60;">25,000/-</b></td>
                    <td><span class="badge">Pending</span></td>
                    <td>
                        <a href="#" class="btn-done" onclick="alert('Order marked as complete!')">Complete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
